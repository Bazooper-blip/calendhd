name: calenDHD
version: "1.3.2"
slug: calendhd
description: "A calm, ADHD-friendly calendar PWA with offline support"
url: "https://github.com/Bazooper-blip/calendhd"
arch:
  - aarch64
  - amd64
  - armv7
init: false
startup: services
boot: auto
ports:
  8090/tcp: 8090
ports_description:
  8090/tcp: "calenDHD Web UI & API (expose via Cloudflare Tunnel for HTTPS)"
map:
  - config:rw
webui: http://[HOST]:[PORT:8090]
options:
  log_level: info
  vapid_public_key: ""
  vapid_private_key: ""
  vapid_email: "mailto:admin@calendhd.local"
schema:
  log_level: list(trace|debug|info|warn|error)
  vapid_public_key: str
  vapid_private_key: password
  vapid_email: str
