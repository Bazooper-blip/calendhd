---
name: calenDHD
strategy: polling
polling_verb: get
polling_url: "{{ instance_url }}/api/calendhd/trmnl?days=5"
polling_headers: "authorization=Bearer {{ feed_token }}"
refresh_interval: 15
custom_fields:
  - keyname: instance_url
    name: calenDHD URL
    description: "Public base URL of your calenDHD instance, without a trailing slash (e.g. https://calendar.example.com). Must be reachable from TRMNL's servers."
    field_type: string
    placeholder: "https://calendar.example.com"
  - keyname: feed_token
    name: Feed token
    description: "Optional. Must match the TRMNL_FEED_TOKEN env var on your calenDHD server. Leave empty if the feed endpoint is open."
    field_type: string
    optional: true
