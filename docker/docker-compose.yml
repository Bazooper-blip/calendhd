version: '3.8'

services:
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: calendhd-pocketbase
    restart: unless-stopped
    ports:
      - '8090:8090'
    volumes:
      - pocketbase-data:/pb_data
      - ../pocketbase/pb_migrations:/pb_migrations:ro
      - ../pocketbase/pb_hooks:/pb_hooks:ro
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY:-}
      - PUSH_SERVICE_URL=http://push-service:3001
    depends_on:
      push-service:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:8090/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  push-service:
    build:
      context: ..
      dockerfile: docker/Dockerfile.push-service
    container_name: calendhd-push-service
    restart: unless-stopped
    environment:
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_EMAIL=${VAPID_EMAIL:-mailto:admin@calendhd.local}
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://localhost:3001/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: calendhd-frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      - VITE_POCKETBASE_URL=http://pocketbase:8090
    depends_on:
      pocketbase:
        condition: service_healthy

  # Optional: Nginx reverse proxy for production
  nginx:
    image: nginx:alpine
    container_name: calendhd-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - frontend
      - pocketbase
    profiles:
      - production

volumes:
  pocketbase-data:
